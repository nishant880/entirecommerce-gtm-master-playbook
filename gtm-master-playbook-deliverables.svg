<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" font-family="-apple-system, 'Poppins', 'Inter', sans-serif">
  <!-- Background -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#75e9d2" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#75e9d2" stop-opacity="0.00"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111119"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="#08080d"/>
  <rect width="1080" height="1080" fill="url(#bgGlow)"/>

  <!-- Top label -->
  <text x="540" y="96" text-anchor="middle" fill="#75e9d2" font-size="20" font-weight="600" letter-spacing="4" font-family="'Poppins', sans-serif">FREE FOR FOUNDER-LED DTC BRANDS</text>

  <!-- Title -->
  <text x="540" y="170" text-anchor="middle" fill="#ffffff" font-size="72" font-weight="800" font-family="'Montserrat', sans-serif" letter-spacing="-2">AI GTM Master Playbook</text>

  <!-- Subtitle -->
  <text x="540" y="220" text-anchor="middle" fill="#9494ad" font-size="24" font-weight="400">Ten function-areas. One master manager. Set up in an hour.</text>

  <!-- 10 cards: 2 cols × 5 rows -->
  <g font-family="'Poppins', sans-serif">
    <!-- 01 Paid Ads -->
    <g transform="translate(40 270)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">01 · PAID ADS</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Always-on Meta + Google campaign engine</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Bidding · audiences · creative briefs · kill rules</text>
    </g>

    <!-- 02 SEO -->
    <g transform="translate(560 270)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">02 · SEO</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Site health + content gaps audited any time</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Technical · on-page · schema · backlinks · CWV</text>
    </g>

    <!-- 03 AI Search -->
    <g transform="translate(40 396)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">03 · AI SEARCH (AEO)</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Citation presence + whitespace tracked weekly</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">ChatGPT · Claude · Perplexity · AI Overview</text>
    </g>

    <!-- 04 Content -->
    <g transform="translate(560 396)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">04 · CONTENT</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Pillars, briefs, drafts, distribution at scale</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">12-month strategy · gap analysis · repurposing</text>
    </g>

    <!-- 05 Influencer + PR -->
    <g transform="translate(40 522)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">05 · INFLUENCER + PR</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Outreach pipeline + journalist database in one</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">DocuSeal · Airtable · Drive integrations</text>
    </g>

    <!-- 06 CRO -->
    <g transform="translate(560 522)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">06 · CRO</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Page, funnel, form audits on demand</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Clarity heatmaps · A/B test setup · popup CRO</text>
    </g>

    <!-- 07 Email + CRM -->
    <g transform="translate(40 648)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">07 · EMAIL + CRM</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Lifecycle flows, segmentation, deliverability</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Klaviyo · Brevo · win-back · churn prevention</text>
    </g>

    <!-- 08 Creative -->
    <g transform="translate(560 648)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">08 · CREATIVE</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Hooks, scripts, ad variations, UGC briefs</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Bulk variations · hook taxonomies · founder-voice</text>
    </g>

    <!-- 09 Analytics + Ops -->
    <g transform="translate(40 774)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">09 · ANALYTICS + OPS</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Daily dashboard + tracking integrity audits</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">GA4 · Meta Pixel · GTM · attribution stitching</text>
    </g>

    <!-- 10 Master Manager (flagship teal card) -->
    <g transform="translate(560 774)">
      <rect width="480" height="112" rx="14" fill="#75e9d2" stroke="#75e9d2" stroke-width="1"/>
      <text x="24" y="40" fill="#08080d" font-size="14" font-weight="700" letter-spacing="3">10 · MASTER MANAGER</text>
      <text x="24" y="74" fill="#08080d" font-size="22" font-weight="700">Weekly orchestration that decides what ships next</text>
      <text x="24" y="98" fill="#08080d" font-size="15" opacity="0.80">Reads every channel · kills what's not working · Monday reprioritisation</text>
    </g>
  </g>

  <!-- Bottom bar: URL + CTA -->
  <g transform="translate(0 924)">
    <line x1="40" y1="0" x2="1040" y2="0" stroke="#1a1a24" stroke-width="1"/>
    <text x="40" y="54" fill="#9494ad" font-size="20" font-weight="500">Drop the bundle into your Claude Code project. The install command does the rest.</text>
    <text x="40" y="104" fill="#ffffff" font-size="32" font-weight="700" font-family="'Montserrat', sans-serif" letter-spacing="-0.5">entir<tspan fill="#75e9d2">ecommerce.ai</tspan><tspan fill="#9494ad">/playbooks/gtm-master-playbook</tspan></text>
  </g>
</svg>
